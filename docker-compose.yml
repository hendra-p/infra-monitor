version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: infra-monitor-db
    environment:
      POSTGRES_USER: inframon
      POSTGRES_PASSWORD: inframon_secret
      POSTGRES_DB: infra_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inframon"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
